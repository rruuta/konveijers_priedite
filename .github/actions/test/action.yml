name: Run Tests
description: Run API tests for greetings service
inputs:
  env-name:
    required: true
runs:
  using: "composite"
  steps:
    - name: Checkout pipeline repo
      uses: actions/checkout@v6

    - name: Checkout course-js-api-framework repo
      uses: actions/checkout@v6
      with:
        repository: mtararujs/course-js-api-framework
        path: course-js-api-framework

    - name: Install Node dependencies
      working-directory: course-js-api-framework
      run: |
        echo "Installing Node dependencies..."
        npm install

    - name: Run API tests
      working-directory: course-js-api-framework
      run: |
        echo "Running greetings_${{ inputs.env-name }} tests..."
        npm run greetings greetings_${{ inputs.env-name }}